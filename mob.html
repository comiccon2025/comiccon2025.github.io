    <style>
        /* Скрываем скроллбар */
        ::-webkit-scrollbar {
            width: 0;
            background: transparent;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Используем height: 100% вместо 100vh для корректной работы на мобильных */
        html, body {
            height: 100%;
            overflow: hidden; /* отключаем скролл */
        }

        body {
            background-color: #0A0C0F;
            font-family: "Inter", system-ui, -apple-system, sans-serif;
            color: #E1E3E6;
            line-height: 1.5;
            font-size: 15px;
            font-weight: 400;
            scrollbar-width: none;
            -ms-overflow-style: none;
            display: flex;
            flex-direction: column;
        }

        /* Шапка абсолютная поверх hero — прозрачная, три логотипа по краям и центр */
        .header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 30;
            padding: 24px 32px;
            background: transparent;
            border-bottom: none;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            pointer-events: none;
        }

        .header-left, .header-center, .header-right {
            display: flex;
            align-items: center;
            pointer-events: auto;
        }

        .header-left {
            justify-content: flex-start;
        }

        .header-center {
            justify-content: center;
        }

        .header-right {
            justify-content: flex-end;
        }

        .logo-link {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: white;
        }

        .logo-link img {
            width: 84px;
            height: 84px;
            display: block;
            transition: transform 0.2s;
        }

        .logo-link img:hover {
            transform: scale(1.05);
        }

        .logo-link span {
            font-size: 36px;
            font-weight: 700;
            color: white;
            letter-spacing: 0.5px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.3);
            white-space: nowrap;
        }

        /* Hero секция занимает всё доступное место (flex: 1) */
        .hero {
            flex: 1;
            width: 100%;
            position: relative;
            overflow: hidden;
        }

        /* Фоновые изображения для перехода */
        .hero-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: opacity 2s ease-in-out;
            z-index: 1;
        }

        .hero-bg-1 {
            background-image: url('https://comiccon2025.github.io/img/snowflake/hero_snow.png');
            opacity: 1;
        }

        .hero-bg-2 {
            background-image: url('https://comiccon2025.github.io/img/snowflake/car.png');
            opacity: 0;
        }

        .hero-bg-3 {
            background-image: url('https://comiccon2025.github.io/img/snowflake/lab.png');
            opacity: 0;
        }

        .hero-bg-4 {
            background-image: url('https://comiccon2025.github.io/img/room/room_plants_3.png');
            opacity: 0;
        }

        .hero-bg-5 {
            background-image: url('https://comiccon2025.github.io/img/snowflake/biotech.png');
            opacity: 0;
        }

        .hero-bg-6 {
            background-image: url('https://comiccon2025.github.io/img/4/4.png');
            opacity: 0;
        }

        .hero-bg-7 {
            background-image: url('https://comiccon2025.github.io/img/4/art_1.png');
            opacity: 0;
        }

        /* Плавающие логотипы (общий контейнер) */
        .floating-logos {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
        }

        .floating-logos img {
            position: absolute;
            width: 48px;
            height: 48px;
            opacity: 0.4;
            filter: drop-shadow(0 4px 10px rgba(0,0,0,0.3));
        }

        /* Разнообразные анимации для плавающих элементов */
        @keyframes float1 {
            0% { transform: translate(0, 0) rotate(0deg) scale(1); }
            100% { transform: translate(-12px, -18px) rotate(6deg) scale(1.05); }
        }
        @keyframes float2 {
            0% { transform: translate(0, 0) rotate(0deg) scale(1); }
            100% { transform: translate(15px, -10px) rotate(-5deg) scale(0.98); }
        }
        @keyframes float3 {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(-8px, 20px) rotate(10deg); }
        }
        @keyframes float4 {
            0% { transform: translate(0, 0) rotate(0deg) scale(1); }
            100% { transform: translate(20px, -12px) rotate(-8deg) scale(1.1); }
        }
        @keyframes float5 {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(-18px, 8px) rotate(4deg); }
        }
        @keyframes float6 {
            0% { transform: translate(0, 0) rotate(0deg) scale(1); }
            100% { transform: translate(10px, 15px) rotate(-3deg) scale(0.95); }
        }
        @keyframes float7 {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(-5px, -22px) rotate(7deg); }
        }

        /* Назначаем каждому логотипу индивидуальную анимацию */
        .floating-logos img.vk-1 { animation: float1 7.2s infinite alternate ease-in-out; }
        .floating-logos img.vk-2 { animation: float2 8.5s infinite alternate ease-in-out; }
        .floating-logos img.vk-3 { animation: float3 6.8s infinite alternate ease-in-out; }
        .floating-logos img.vk-4 { animation: float4 9s infinite alternate ease-in-out; }
        .floating-logos img.vk-5 { animation: float5 5.5s infinite alternate ease-in-out; }
        .floating-logos img.vk-6 { animation: float6 7.9s infinite alternate ease-in-out; }
        .floating-logos img.vk-7 { animation: float7 8.2s infinite alternate ease-in-out; }
        .floating-logos img.snow-1 { animation: float2 6.3s infinite alternate ease-in-out; }
        .floating-logos img.snow-2 { animation: float4 7.7s infinite alternate ease-in-out; }
        .floating-logos img.snow-3 { animation: float6 9.1s infinite alternate ease-in-out; }
        .floating-logos img.snow-4 { animation: float1 5.8s infinite alternate ease-in-out; }
        .floating-logos img.snow-5 { animation: float3 8.9s infinite alternate ease-in-out; }
        .floating-logos img.snow-6 { animation: float5 6.1s infinite alternate ease-in-out; }
        .floating-logos img.snow-7 { animation: float7 7.4s infinite alternate ease-in-out; }

        /* Позиции */
        .floating-logos img.vk-1 { top: 12%; left: 5%; }
        .floating-logos img.vk-2 { bottom: 18%; right: 7%; width: 64px; height: 64px; opacity: 0.3; }
        .floating-logos img.vk-3 { top: 25%; right: 15%; opacity: 0.25; width: 40px; height: 40px; }
        .floating-logos img.vk-4 { bottom: 30%; left: 12%; width: 56px; height: 56px; opacity: 0.35; }
        .floating-logos img.vk-5 { top: 70%; left: 20%; width: 36px; height: 36px; opacity: 0.45; }
        .floating-logos img.vk-6 { top: 45%; right: 25%; width: 52px; height: 52px; opacity: 0.3; }
        .floating-logos img.vk-7 { bottom: 10%; left: 40%; width: 44px; height: 44px; opacity: 0.4; }

        .floating-logos img.snow-1 { top: 15%; right: 8%; width: 50px; height: 50px; opacity: 0.4; }
        .floating-logos img.snow-2 { bottom: 22%; left: 18%; width: 58px; height: 58px; opacity: 0.3; }
        .floating-logos img.snow-3 { top: 60%; left: 30%; width: 42px; height: 42px; opacity: 0.35; }
        .floating-logos img.snow-4 { top: 35%; right: 35%; width: 48px; height: 48px; opacity: 0.45; }
        .floating-logos img.snow-5 { bottom: 40%; right: 12%; width: 38px; height: 38px; opacity: 0.4; }
        .floating-logos img.snow-6 { top: 80%; left: 8%; width: 46px; height: 46px; opacity: 0.3; }
        .floating-logos img.snow-7 { bottom: 8%; right: 30%; width: 54px; height: 54px; opacity: 0.35; }

        /* Логотип движка (слева по центру) */
        .engine-logo {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 15;
            pointer-events: none; /* чтобы не мешал кликам, но если нужно сделать ссылкой, изменим */
            max-width: 150px;
            width: 15%;
            min-width: 100px;
        }

        .engine-logo img {
            width: 100%;
            height: auto;
            display: block;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
        }

        /* Футер с иконками — обычный блок */
        .footer-icons {
            background-color: #0077ff;
            padding: 18px 10%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            font-size: 16px;
            font-weight: 500;
            box-shadow: 0 -4px 15px rgba(0,0,0,0.2);
            z-index: 20;
            width: 100%;
            flex-shrink: 0;
        }

        .icon-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            transition: color 0.2s, transform 0.2s;
            color: white;
        }

        .icon-item i {
            font-size: 36px;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.2));
        }

        .icon-item span {
            font-size: 14px;
            letter-spacing: 0.5px;
            opacity: 0.95;
            font-weight: 600;
        }

        .icon-item:hover {
            transform: translateY(-3px);
        }

        /* Планшеты (max-width: 900px) */
        @media (max-width: 900px) {
            .header {
                padding: 16px 20px;
            }
            .logo-link img {
                width: 72px;
                height: 72px;
            }
            .logo-link span {
                font-size: 28px;
            }
            .engine-logo {
                left: 15px;
                max-width: 120px;
            }
        }

        /* Мобильные (max-width: 700px) */
        @media (max-width: 700px) {
            .header {
                padding: 12px 16px;
            }
            .logo-link img {
                width: 60px;
                height: 60px;
            }
            .logo-link span {
                font-size: 22px;
            }
            .footer-icons {
                padding: 12px 5%;
            }
            .icon-item i {
                font-size: 30px;
            }
            .icon-item span {
                font-size: 12px;
            }
            /* Прячем VR и PC, оставляем MOBILE, WEB, AR */
            .footer-icons .icon-item:nth-child(1),
            .footer-icons .icon-item:nth-child(2) {
                display: none;
            }
            .floating-logos img {
                width: 30px !important;
                height: 30px !important;
            }
            /* Скрываем логотип движка на мобильных, чтобы не загромождать */
            .engine-logo {
                display: none;
            }
        }

        /* Очень узкие экраны: скрываем текст у всех логотипов */
        @media (max-width: 480px) {
            .logo-link span {
                display: none;
            }
        }
    </style>
</head>
<body>
    <!-- Шапка: три логотипа (левый, центр, правый) -->
    <header class="header">
        <div class="header-left">
            <a href="https://vkplay.ru/" target="_blank" class="logo-link">
                <img src="https://comiccon2025.github.io/img/rosatom.png" alt="РОСАТОМ" width="84" height="84">

        </div>
        <div class="header-center">
            <!-- Логотип РОСАТОМ с текстом (скрывается на мобильных автоматически) -->
            <!-- <span class="logo-link" style="cursor:default;">
                <img src="https://comiccon2025.github.io/img/rosatom.png" alt="РОСАТОМ" width="84" height="84">
                <span>РОСАТОМ</span>

        </div>
        <div class="header-right">
            <span class="logo-link" style="cursor:default;">
                <img src="https://comiccon2025.github.io/img/snowflake/logo_2.png" alt="МАС Снежинка" width="84" height="84" onerror="this.style.display='none'; this.parentElement.innerHTML+='<span>❄️ МАС «Снежинка»</span>'">
                <span>МАС &laquo;Снежинка&raquo;</span>
            </span>
        </div>
    </header>

    <!-- Hero секция с переключающимися фонами (flex: 1) -->
    <section class="hero">
        <!-- Семь слоёв для crossfade -->
        <div class="hero-bg hero-bg-1"></div>
        <div class="hero-bg hero-bg-2"></div>
        <div class="hero-bg hero-bg-3"></div>
        <div class="hero-bg hero-bg-4"></div>
        <div class="hero-bg hero-bg-5"></div>
        <div class="hero-bg hero-bg-6"></div>
        <div class="hero-bg hero-bg-7"></div>

        <!-- Плавающие логотипы VK Play и Снежинки -->
        <div class="floating-logos">
            <!-- VK Play (7 штук) PNG -->
            <img src="https://comiccon2025.github.io/img/vk_play_logo.png" alt="VK Play" class="vk-1">
            <img src="https://comiccon2025.github.io/img/vk_play_logo.png" alt="VK Play" class="vk-2">
            <img src="https://comiccon2025.github.io/img/vk_play_logo.png" alt="VK Play" class="vk-3">
            <img src="https://comiccon2025.github.io/img/vk_play_logo.png" alt="VK Play" class="vk-4">
            <img src="https://comiccon2025.github.io/img/vk_play_logo.png" alt="VK Play" class="vk-5">
            <img src="https://comiccon2025.github.io/img/vk_play_logo.png" alt="VK Play" class="vk-6">
            <img src="https://comiccon2025.github.io/img/vk_play_logo.png" alt="VK Play" class="vk-7">

            <!-- Снежинка логотипы (7 штук) -->
            <img src="https://comiccon2025.github.io/img/snowflake/logo_2.png" alt="Снежинка" class="snow-1">
            <img src="https://comiccon2025.github.io/img/snowflake/logo_2.png" alt="Снежинка" class="snow-2">
            <img src="https://comiccon2025.github.io/img/snowflake/logo_2.png" alt="Снежинка" class="snow-3">
            <img src="https://comiccon2025.github.io/img/snowflake/logo_2.png" alt="Снежинка" class="snow-4">
            <img src="https://comiccon2025.github.io/img/snowflake/logo_2.png" alt="Снежинка" class="snow-5">
            <img src="https://comiccon2025.github.io/img/snowflake/logo_2.png" alt="Снежинка" class="snow-6">
            <img src="https://comiccon2025.github.io/img/snowflake/logo_2.png" alt="Снежинка" class="snow-7">

        <!-- Логотип движка (слева по центру) -->
        <div class="engine-logo">
            <img src="https://comiccon2025.github.io/img/made_with_unigine2_white.png" alt="Made with UNIGINE">
        </div>
    </section>

    <!-- Футер с иконками VR, PC, MOBILE, WEB, AR -->
    <div class="footer-icons">
        <div class="icon-item"><i class="fas fa-vr-cardboard"></i><span>VR</span></div>
        <div class="icon-item"><i class="fas fa-desktop"></i><span>PC</span></div>
        <div class="icon-item"><i class="fas fa-mobile-alt"></i><span>MOBILE</span></div>
        <div class="icon-item"><i class="fas fa-globe"></i><span>WEB</span></div>
        <div class="icon-item"><i class="fas fa-glasses"></i><span>AR</span></div>
    </div>

    <script>
        (function() {
            // Crossfade between seven background images
            const bg1 = document.querySelector('.hero-bg-1');
            const bg2 = document.querySelector('.hero-bg-2');
            const bg3 = document.querySelector('.hero-bg-3');
            const bg4 = document.querySelector('.hero-bg-4');
            const bg5 = document.querySelector('.hero-bg-5');
            const bg6 = document.querySelector('.hero-bg-6');
            const bg7 = document.querySelector('.hero-bg-7');
            const backgrounds = [bg1, bg2, bg3, bg4, bg5, bg6, bg7];
            let currentIndex = 0;

            // Set initial opacity
            backgrounds.forEach((bg, index) => {
                bg.style.opacity = index === 0 ? '1' : '0';
            });

            setInterval(() => {
                const nextIndex = (currentIndex + 1) % backgrounds.length;
                
                // Fade out current, fade in next
                backgrounds[currentIndex].style.opacity = '0';
                backgrounds[nextIndex].style.opacity = '1';
                
                currentIndex = nextIndex;
            }, 25000); // switch every 25 seconds (в 5 раз медленнее)
        })();
    </script>
