    <style>
        /* Скрываем скроллбар */
        ::-webkit-scrollbar {
            width: 0;
            background: transparent;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            background-color: #0A0C0F;
            font-family: "Inter", system-ui, -apple-system, sans-serif;
            color: #E1E3E6;
            line-height: 1.5;
            font-size: 15px;
            font-weight: 400;
            scrollbar-width: none;
            -ms-overflow-style: none;
            display: flex;
            flex-direction: column;
        }

        /* Hero секция занимает всё доступное место (flex: 1) */
        .hero {
            flex: 1;
            width: 100%;
            position: relative;
            overflow: hidden;
        }

        /* Фоновые изображения для перехода (теперь 8 слоёв) */
        .hero-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: opacity 2s ease-in-out;
            z-index: 1;
        }

        .hero-bg-1 {
            background-image: url('https://comiccon2025.github.io/img/snowflake/hero_snow.png');
            opacity: 1;
        }

        .hero-bg-2 {
            background-image: url('https://comiccon2025.github.io/img/snowflake/car.png');
            opacity: 0;
        }

        .hero-bg-3 {
            background-image: url('https://comiccon2025.github.io/img/snowflake/lab.png');
            opacity: 0;
        }

        .hero-bg-4 {
            background-image: url('https://comiccon2025.github.io/img/room/room_plants_3.png');
            opacity: 0;
        }

        .hero-bg-5 {
            background-image: url('https://refoldit.github.io/img/snowflake/biotech_folding.png');
            opacity: 0;
        }

        .hero-bg-6 {
            background-image: url('https://refoldit.github.io/img/snowflake/biotech_plants.png'); /* заменено */
            opacity: 0;
        }

        .hero-bg-7 {
            background-image: url('https://refoldit.github.io/img/snowflake/art_character.png');
            opacity: 0;
        }

        .hero-bg-8 {
            background-image: url('https://refoldit.github.io/img/snowflake/biotech_plants_1.png'); /* новое */
            opacity: 0;
        }

        /* Плавающие логотипы (общий контейнер) */
        .floating-logos {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
        }

        .floating-logos img {
            position: absolute;
            width: 48px;
            height: 48px;
            opacity: 0.4;
            filter: drop-shadow(0 4px 10px rgba(0,0,0,0.3));
        }

        /* Анимации для плавающих элементов */
        @keyframes float1 {
            0% { transform: translate(0, 0) rotate(0deg) scale(1); }
            100% { transform: translate(-12px, -18px) rotate(6deg) scale(1.05); }
        }
        @keyframes float2 {
            0% { transform: translate(0, 0) rotate(0deg) scale(1); }
            100% { transform: translate(15px, -10px) rotate(-5deg) scale(0.98); }
        }
        @keyframes float3 {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(-8px, 20px) rotate(10deg); }
        }
        @keyframes float4 {
            0% { transform: translate(0, 0) rotate(0deg) scale(1); }
            100% { transform: translate(20px, -12px) rotate(-8deg) scale(1.1); }
        }
        @keyframes float5 {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(-18px, 8px) rotate(4deg); }
        }
        @keyframes float6 {
            0% { transform: translate(0, 0) rotate(0deg) scale(1); }
            100% { transform: translate(10px, 15px) rotate(-3deg) scale(0.95); }
        }
        @keyframes float7 {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(-5px, -22px) rotate(7deg); }
        }

        .floating-logos img.vk-1 { animation: float1 7.2s infinite alternate ease-in-out; }
        .floating-logos img.vk-2 { animation: float2 8.5s infinite alternate ease-in-out; }
        .floating-logos img.vk-3 { animation: float3 6.8s infinite alternate ease-in-out; }
        .floating-logos img.vk-4 { animation: float4 9s infinite alternate ease-in-out; }
        .floating-logos img.vk-5 { animation: float5 5.5s infinite alternate ease-in-out; }
        .floating-logos img.vk-6 { animation: float6 7.9s infinite alternate ease-in-out; }
        .floating-logos img.vk-7 { animation: float7 8.2s infinite alternate ease-in-out; }
        .floating-logos img.snow-1 { animation: float2 6.3s infinite alternate ease-in-out; }
        .floating-logos img.snow-2 { animation: float4 7.7s infinite alternate ease-in-out; }
        .floating-logos img.snow-3 { animation: float6 9.1s infinite alternate ease-in-out; }
        .floating-logos img.snow-4 { animation: float1 5.8s infinite alternate ease-in-out; }
        .floating-logos img.snow-5 { animation: float3 8.9s infinite alternate ease-in-out; }
        .floating-logos img.snow-6 { animation: float5 6.1s infinite alternate ease-in-out; }
        .floating-logos img.snow-7 { animation: float7 7.4s infinite alternate ease-in-out; }

        /* Позиции */
        .floating-logos img.vk-1 { top: 12%; left: 5%; }
        .floating-logos img.vk-2 { bottom: 18%; right: 7%; width: 64px; height: 64px; opacity: 0.3; }
        .floating-logos img.vk-3 { top: 25%; right: 15%; opacity: 0.25; width: 40px; height: 40px; }
        .floating-logos img.vk-4 { bottom: 30%; left: 12%; width: 56px; height: 56px; opacity: 0.35; }
        .floating-logos img.vk-5 { top: 70%; left: 20%; width: 36px; height: 36px; opacity: 0.45; }
        .floating-logos img.vk-6 { top: 45%; right: 25%; width: 52px; height: 52px; opacity: 0.3; }
        .floating-logos img.vk-7 { bottom: 10%; left: 40%; width: 44px; height: 44px; opacity: 0.4; }

        .floating-logos img.snow-1 { top: 15%; right: 8%; width: 50px; height: 50px; opacity: 0.4; }
        .floating-logos img.snow-2 { bottom: 22%; left: 18%; width: 58px; height: 58px; opacity: 0.3; }
        .floating-logos img.snow-3 { top: 60%; left: 30%; width: 42px; height: 42px; opacity: 0.35; }
        .floating-logos img.snow-4 { top: 35%; right: 35%; width: 48px; height: 48px; opacity: 0.45; }
        .floating-logos img.snow-5 { bottom: 40%; right: 12%; width: 38px; height: 38px; opacity: 0.4; }
        .floating-logos img.snow-6 { top: 80%; left: 8%; width: 46px; height: 46px; opacity: 0.3; }
        .floating-logos img.snow-7 { bottom: 8%; right: 30%; width: 54px; height: 54px; opacity: 0.35; }

        /* Футер */
        .footer {
            background-color: #0077ff;
            padding: 18px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            box-shadow: 0 -4px 15px rgba(0,0,0,0.2);
            z-index: 20;
            width: 100%;
            flex-shrink: 0;
        }

        /* Общие правила для изображений в футере: максимум 52px по высоте на десктопе */
        .footer img {
            max-height: 52px;
            width: auto;
            display: block;
        }

        /* Левая часть (Росатом) */
        .footer-left .logo-link {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: white;
        }

        .logo-composite {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .divider {
            width: 2px;
            height: 52px;
            background-color: white;
            opacity: 0.9;
            border-radius: 1px;
        }

        .logo-text {
            display: flex;
            flex-direction: column;
            line-height: 1.2;
            font-weight: 700;
            color: white;
            text-shadow: 0 2px 5px rgba(0,0,0,0.3);
            font-size: 8px;
            letter-spacing: 0.5px;
        }

        .logo-text span {
            white-space: nowrap;
        }

        /* Центральная часть (VK Play) */
        .footer-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .footer-center a {
            display: block;
            line-height: 0;
        }

        /* Убираем тень у логотипа VK Play */
        .footer-center img {
            filter: none;
        }

        .vk-text {
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        /* Правая часть (движок) */
        .footer-right img {
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
        }

        /* Планшеты (max-width: 900px) */
        @media (max-width: 900px) {
            .footer {
                padding: 16px 20px;
            }
        }

        /* Мобильные (max-width: 700px) */
        @media (max-width: 700px) {
            .footer {
                padding: 12px 16px;
            }
            .footer img {
                max-height: 60px;
            }
            .divider {
                height: 60px;
            }
            .vk-text {
                font-size: 12px;
            }
            .floating-logos img {
                width: 30px !important;
                height: 30px !important;
            }
        }

        /* Очень узкие экраны: скрываем текст у логотипа Росатома */
        @media (max-width: 480px) {
            .divider,
            .logo-text {
                display: none;
            }
        }
    </style>
</head>
<body>
    <!-- Hero секция с переключающимися фонами (теперь 8 фонов) -->
    <section class="hero">
        <!-- Восемь слоёв для crossfade -->
        <div class="hero-bg hero-bg-1"></div>
        <div class="hero-bg hero-bg-2"></div>
        <div class="hero-bg hero-bg-3"></div>
        <div class="hero-bg hero-bg-4"></div>
        <div class="hero-bg hero-bg-5"></div>
        <div class="hero-bg hero-bg-6"></div>
        <div class="hero-bg hero-bg-7"></div>
        <div class="hero-bg hero-bg-8"></div>

        <!-- Плавающие логотипы: Росатом и снежинка -->
        <div class="floating-logos">
            <!-- Росатом (7 штук) -->
            <img src="https://refoldit.github.io/img/logo/rosatom_white.png" alt="Росатом" class="vk-1">
            <img src="https://refoldit.github.io/img/logo/rosatom_white.png" alt="Росатом" class="vk-2">
            <img src="https://refoldit.github.io/img/logo/rosatom_white.png" alt="Росатом" class="vk-3">
            <img src="https://refoldit.github.io/img/logo/rosatom_white.png" alt="Росатом" class="vk-4">
            <img src="https://refoldit.github.io/img/logo/rosatom_white.png" alt="Росатом" class="vk-5">
            <img src="https://refoldit.github.io/img/logo/rosatom_white.png" alt="Росатом" class="vk-6">
            <img src="https://refoldit.github.io/img/logo/rosatom_white.png" alt="Росатом" class="vk-7">

            <!-- Снежинка (7 штук) – белые -->
            <img src="https://refoldit.github.io/img/logo/snowflake_logo_white.png" alt="Снежинка" class="snow-1">
            <img src="https://refoldit.github.io/img/logo/snowflake_logo_white.png" alt="Снежинка" class="snow-2">
            <img src="https://refoldit.github.io/img/logo/snowflake_logo_white.png" alt="Снежинка" class="snow-3">
            <img src="https://refoldit.github.io/img/logo/snowflake_logo_white.png" alt="Снежинка" class="snow-4">
            <img src="https://refoldit.github.io/img/logo/snowflake_logo_white.png" alt="Снежинка" class="snow-5">
            <img src="https://refoldit.github.io/img/logo/snowflake_logo_white.png" alt="Снежинка" class="snow-6">
            <img src="https://refoldit.github.io/img/logo/snowflake_logo_white.png" alt="Снежинка" class="snow-7">
        </div>
    </section>

    <!-- Футер -->
    <footer class="footer">
        <!-- Левая часть: Росатом -->
        <div class="footer-left">
            <a href="https://vkplay.ru/" target="_blank" class="logo-link">
                <div class="logo-composite">
                    <img src="https://refoldit.github.io/img/logo/rosatom_white.png" alt="РОСАТОМ">
                    <div class="divider"></div>
                    <div class="logo-text">
                        <span>КВАНТОВЫЕ</span>
                        <span>ТЕХНОЛОГИИ</span>
                        <span>РОСАТОМ</span>
                    </div>
                </div>
            </a>
        </div>

        <!-- Центральная часть: VK Play + текст -->
        <div class="footer-center">
            <a href="https://vkplay.ru/" target="_blank">
                <img src="https://comiccon2025.github.io/img/vk_play_logo.png" alt="VK Play">
            </a>
            <span class="vk-text">VK Play</span>
        </div>

        <!-- Правая часть: логотип движка -->
        <div class="footer-right">
            <img src="https://comiccon2025.github.io/img/made_with_unigine2_white.png" alt="Made with UNIGINE">
        </div>
    </footer>

    <script>
        (function() {
            // Получаем все 8 фонов
            const bg1 = document.querySelector('.hero-bg-1');
            const bg2 = document.querySelector('.hero-bg-2');
            const bg3 = document.querySelector('.hero-bg-3');
            const bg4 = document.querySelector('.hero-bg-4');
            const bg5 = document.querySelector('.hero-bg-5');
            const bg6 = document.querySelector('.hero-bg-6');
            const bg7 = document.querySelector('.hero-bg-7');
            const bg8 = document.querySelector('.hero-bg-8');
            const backgrounds = [bg1, bg2, bg3, bg4, bg5, bg6, bg7, bg8];
            let currentIndex = 0;

            // Устанавливаем начальную прозрачность: первый видим, остальные скрыты
            backgrounds.forEach((bg, index) => {
                bg.style.opacity = index === 0 ? '1' : '0';
            });

            setInterval(() => {
                const nextIndex = (currentIndex + 1) % backgrounds.length;
                backgrounds[currentIndex].style.opacity = '0';
                backgrounds[nextIndex].style.opacity = '1';
                currentIndex = nextIndex;
            }, 25000); // 25 секунд
        })();
    </script>
