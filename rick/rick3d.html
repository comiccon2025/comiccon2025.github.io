<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rick Sanchez UE4 Controller</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #111; font-family: sans-serif; }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0, 0, 0, 0.5);
            padding: 15px;
            border-radius: 8px;
            pointer-events: none;
        }
        #instructions {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: #00ff00;
            font-weight: bold;
            text-shadow: 1px 1px 2px black;
        }
        canvas { display: block; }
    </style>
</head>
<body>

<div id="ui">
    <h2 style="margin:0 0 10px 0;">Rick Sanchez Control</h2>
    <p>WASD — Передвижение</p>
    <p>Мышь — Вращение камеры</p>
</div>

<div id="instructions">Загрузка портальной пушки...</div>

<script>
    // Основные переменные
    let scene, camera, renderer, clock, controls;
    let model, mixer, animations = {};
    let currentAction, activeAction;
    
    // Состояние ввода
    const keys = { w: false, a: false, s: false, d: false };
    const walkDirection = new THREE.Vector3();
    const rotateQuaternion = new THREE.Quaternion();
    const rotateAngle = new THREE.Euler();
    const cameraTarget = new THREE.Vector3();
    
    // Параметры движения
    const fadeDuration = 0.2;
    const runVelocity = 5;
    
    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x202020);
        scene.fog = new THREE.Fog(0x202020, 10, 50);

        camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2, 5);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // Освещение
        const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.6);
        scene.add(hemiLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(3, 10, 10);
        dirLight.castShadow = true;
        scene.add(dirLight);

        // Пол (сетка в стиле дебага UE4)
        const grid = new THREE.GridHelper(100, 100, 0x444444, 0x222222);
        scene.add(grid);
        
        const floorGeometry = new THREE.PlaneGeometry(100, 100);
        const floorMaterial = new THREE.MeshPhongMaterial({ color: 0x111111, depthWrite: false });
        const floor = new THREE.Mesh(floorGeometry, floorMaterial);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        clock = new THREE.Clock();

        // Камера
        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enablePan = false;
        controls.enableDamping = true;
        controls.minDistance = 2;
        controls.maxDistance = 10;

        // Загрузка модели
        const loader = new THREE.GLTFLoader();
        const modelUrl = 'https://tripreport.github.io/3D/rick_sanchez.glb';

        loader.load(modelUrl, (gltf) => {
            model = gltf.scene;
            model.traverse(node => {
                if (node.isMesh) {
                    node.castShadow = true;
                    node.receiveShadow = true;
                }
            });
            
            scene.add(model);
            document.getElementById('instructions').innerText = 'Рик прибыл! Используй WASD';

            // Инициализация анимаций
            mixer = new THREE.AnimationMixer(model);
            
            // Если в GLB запечены анимации (Idle, Walk и т.д.)
            gltf.animations.forEach(clip => {
                const action = mixer.clipAction(clip);
                animations[clip.name.toLowerCase()] = action;
            });

            // По умолчанию включаем первую доступную анимацию
            if (gltf.animations.length > 0) {
                activeAction = mixer.clipAction(gltf.animations[0]);
                activeAction.play();
            }

        }, undefined, (error) => {
            console.error(error);
            document.getElementById('instructions').innerText = 'Ошибка загрузки модели';
        });

        // Слушатели событий
        window.addEventListener('resize', onWindowResize);
        document.addEventListener('keydown', (e) => updateKey(e.key.toLowerCase(), true));
        document.addEventListener('keyup', (e) => updateKey(e.key.toLowerCase(), false));
    }

    function updateKey(key, value) {
        if (keys.hasOwnProperty(key)) keys[key] = value;
    }

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function updateCharacter(delta) {
        if (!model) return;

        const directionPressed = keys.w || keys.a || keys.s || keys.d;
        
        // Логика анимации (если анимации называются walk и idle)
        let play = 'idle';
        if (directionPressed) play = 'walk';
        
        // Очень простая реализация переключения (если анимации есть в файле)
        /*
        if (animations[play] && activeAction !== animations[play]) {
            const nextAction = animations[play];
            activeAction.fadeOut(fadeDuration);
            nextAction.reset().fadeIn(fadeDuration).play();
            activeAction = nextAction;
        }
        */

        if (directionPressed) {
            // Вычисляем угол поворота относительно камеры
            const angleYCameraDirection = Math.atan2(
                (camera.position.x - model.position.x), 
                (camera.position.z - model.position.z)
            );
            
            // Смещение направления в зависимости от нажатых клавиш
            let directionOffset = 0;
            if (keys.w) {
                if (keys.a) directionOffset = Math.PI / 4;
                else if (keys.d) directionOffset = -Math.PI / 4;
            } else if (keys.s) {
                if (keys.a) directionOffset = Math.PI / 4 + Math.PI / 2;
                else if (keys.d) directionOffset = -Math.PI / 4 - Math.PI / 2;
                else directionOffset = Math.PI;
            } else if (keys.a) {
                directionOffset = Math.PI / 2;
            } else if (keys.d) {
                directionOffset = -Math.PI / 2;
            }

            // Поворот модели
            rotateQuaternion.setFromAxisAngle(new THREE.Vector3(0, 1, 0), angleYCameraDirection + directionOffset);
            model.quaternion.rotateTowards(rotateQuaternion, 0.2);

            // Движение
            camera.getWorldDirection(walkDirection);
            walkDirection.y = 0;
            walkDirection.normalize();
            walkDirection.applyAxisAngle(new THREE.Vector3(0, 1, 0), directionOffset);

            const moveX = walkDirection.x * runVelocity * delta;
            const moveZ = walkDirection.z * runVelocity * delta;
            model.position.x += moveX;
            model.position.z += moveZ;
        }

        // Слежение камеры за Риком
        cameraTarget.set(model.position.x, model.position.y + 1, model.position.z);
        controls.target = cameraTarget;
    }

    function animate() {
        requestAnimationFrame(animate);
        const delta = clock.getDelta();
        
        if (mixer) mixer.update(delta);
        
        updateCharacter(delta);
        controls.update();
        renderer.render(scene, camera);
    }

    init();
    animate();
</script>

</body>
</html>
